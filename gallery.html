<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গ্যালারি - DUSAB</title>
<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">
<!-- থিম কালার (মোবাইলের স্ট্যাটাস বারের রং পরিবর্তন করবে) -->
<meta name="theme-color" content="#7D1B7E">
<!-- অ্যাপল ডিভাইসের জন্য -->
<link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #7D1B7E; --secondary-color: #262E7A; --accent-color: #D4AF37; --bg-light: #f4f5f7; --text-dark: #212529; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; padding-top: 80px; }
        header { background-color: var(--white); position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .navbar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 10px 20px; }
        .logo img { height: 60px; display: block; }
        .nav-links { display: flex; list-style: none; align-items: center; }
        .nav-links li { position: relative; }
        .nav-links a { color: var(--primary-color); text-decoration: none; padding: 10px 15px; font-size: 17px; font-weight: 600; transition: 0.3s; display: block; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-color); }
        .dropdown { position: relative; }
        .dropdown-menu { display: none; position: absolute; top: 100%; right: 0; background-color: var(--white); min-width: 160px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border-top: 3px solid var(--accent-color); list-style: none; padding: 5px 0; }
        .dropdown-menu li a { padding: 10px 15px; font-size: 15px; color: var(--primary-color); }
        .dropdown:hover .dropdown-menu { display: block; }
        .menu-toggle { display: none; color: var(--primary-color); font-size: 26px; cursor: pointer; }
        .page-header { background: linear-gradient(rgba(125, 27, 126, 0.85), rgba(38, 46, 122, 0.90)), url('https://images.unsplash.com/photo-1540575467063-178a50c2df87?q=80&w=1200') no-repeat center center/cover; padding: 80px 20px 50px; text-align: center; color: var(--white); }
        .page-header h1 { font-size: 36px; color: var(--accent-color); margin-bottom: 10px; }
        .gallery-container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .gallery-item { background: var(--white); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .gallery-item img { width: 100%; height: 220px; object-fit: cover; display: block; }
        .gallery-details { padding: 15px; }
        .gallery-date { font-size: 13px; color: var(--primary-color); font-weight: 600; margin-bottom: 5px; }
        .gallery-caption { font-size: 16px; font-weight: bold; color: var(--secondary-color); }
        #loadingMessage { text-align: center; font-size: 18px; color: var(--primary-color); grid-column: 1 / -1; }
                @media (max-width: 768px) {
            .menu-toggle { display: block; }
            /* মেনু স্ক্রলিং যুক্ত করা হয়েছে যেন মেনু বড় হলে নিচে যাওয়া যায় */
            .nav-links { position: absolute; top: 100%; left: -100%; width: 100%; height: 100vh; background-color: var(--white); flex-direction: column; align-items: flex-start; padding: 20px; transition: 0.5s; overflow-y: auto; }
            .nav-links.active { left: 0; }
            
            /* ড্রপডাউন মোবাইল ফিক্স */
            .dropdown { width: 100%; }
            .dropdown-menu { 
                position: static; /* স্ক্রিনের বাইরে যাওয়া বন্ধ করবে */
                box-shadow: none; 
                border-top: none; 
                padding-left: 20px; 
                margin-top: 5px; 
                border-left: 3px solid var(--accent-color); 
                background-color: transparent;
                display: none;
            }
            /* মোবাইলে টাচ করলে ড্রপডাউন খুলবে */
            .dropdown:hover .dropdown-menu, 
            .dropdown:active .dropdown-menu, 
            .dropdown:focus-within .dropdown-menu { 
                display: block; 
            }
        }

    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo"><a href="index.html"><img src="logo.png" alt="Logo"></a></div>
            <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
            <ul class="nav-links" id="nav-menu"></ul>
        </div>
    </header>
    <section class="page-header"><h1>ফোটো গ্যালারি</h1><p>ডুসাব পরিবারের কিছু স্মরণীয় মুহূর্ত</p></section>
    <div class="gallery-container"><div class="gallery-grid" id="galleryGrid"><div id="loadingMessage"><i class="fas fa-spinner fa-spin"></i> ছবিগুলো লোড হচ্ছে...</div></div></div>
    <script>
        // ========================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbzraHbfvmMpaJko-nlrcK4kSpuU0XUdVsks-Bi-nVfyYLB3-Noh_EuM2_Nsk488N5z1/exec"; // <-- URL বসান
        // ========================================================
        document.getElementById('mobile-menu').addEventListener('click', () => { document.getElementById('nav-menu').classList.toggle('active'); });

        const memberDataString = sessionStorage.getItem('memberData'), navMenu = document.getElementById('nav-menu');
        if (memberDataString) {
            navMenu.innerHTML = `<li><a href="index.html"><i class="fas fa-home"></i> হোম</a></li><li><a href="gallery.html" class="active"><i class="fas fa-images"></i> গ্যালারি</a></li><li><a href="member-directory.html"><i class="fas fa-users"></i> মেম্বার ডিরেক্টরি</a></li><li><a href="notice.html"><i class="fas fa-bullhorn"></i> নোটিশ</a></li><li><a href="profile.html"><i class="fas fa-user-circle"></i> প্রোফাইল</a></li>`;
        } else {
            navMenu.innerHTML = `<li><a href="index.html"><i class="fas fa-home"></i> হোম</a></li><li><a href="gallery.html" class="active"><i class="fas fa-images"></i> গ্যালারি</a></li><li><a href="notice.html"><i class="fas fa-bullhorn"></i> নোটিশ</a></li><li class="dropdown"><a href="javascript:void(0)"><i class="fas fa-user"></i> লগইন <i class="fas fa-caret-down"></i></a><ul class="dropdown-menu"><li><a href="admin-login.html">এডমিন লগইন</a></li><li><a href="member-login-registration.html">মেম্বার লগইন</a></li></ul></li>`;
        }

        // সংশোধিত: ছবি নিয়ে আসার জন্য POST রিকোয়েস্ট
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "get_gallery" }) })
        .then(res => res.json()).then(data => {
            document.getElementById('loadingMessage').style.display = 'none'; const grid = document.getElementById('galleryGrid');
            if(data.length === 0) { grid.innerHTML = '<h3 style="text-align:center; grid-column:1/-1; color:#888;">কোনো ছবি পাওয়া যায়নি।</h3>'; return; }
            data.reverse().forEach(item => {
                grid.innerHTML += `<div class="gallery-item"><img src="${item.url}"><div class="gallery-details"><div class="gallery-date"><i class="far fa-calendar-alt"></i> ${item.date}</div><div class="gallery-caption">${item.caption}</div></div></div>`;
            });
        }).catch(() => { document.getElementById('loadingMessage').innerHTML = 'ছবি লোড করতে সমস্যা হয়েছে!'; });
    </script>
<script>
    // Service Worker রেজিস্টার করা
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
            .then(registration => {
                console.log('Service Worker Registered Successfully!', registration.scope);
            })
            .catch(err => {
                console.log('Service Worker Registration Failed:', err);
            });
        });
    }
</script>

</body>
</html>
