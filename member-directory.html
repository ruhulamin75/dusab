<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মেম্বার ডিরেক্টরি - DUSAB</title>
    <!-- PWA Manifest -->
<link rel="manifest" href="/dusab/manifest.json">
<!-- থিম কালার (মোবাইলের স্ট্যাটাস বারের রং পরিবর্তন করবে) -->
<meta name="theme-color" content="#7D1B7E">
<!-- অ্যাপল ডিভাইসের জন্য -->
<link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-color: #7D1B7E; --secondary-color: #262E7A; --accent-color: #D4AF37; --bg-light: #f4f5f7; --text-dark: #212529; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; padding-top: 80px; }

        /* ডাইনামিক নেভিগেশন বার */
        header { background-color: var(--white); position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .navbar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 10px 20px; }
        .logo img { height: 60px; display: block; }
        .nav-links { display: flex; list-style: none; align-items: center; }
        .nav-links li { position: relative; }
        .nav-links a { color: var(--primary-color); text-decoration: none; padding: 10px 15px; font-size: 17px; font-weight: 600; transition: 0.3s; display: block; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-color); }
        .menu-toggle { display: none; color: var(--primary-color); font-size: 26px; cursor: pointer; }

        /* পেজ হেডার */
        .page-header { background: linear-gradient(rgba(125, 27, 126, 0.85), rgba(38, 46, 122, 0.90)), url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=1200') no-repeat center center/cover; padding: 80px 20px 50px; text-align: center; color: var(--white); }
        .page-header h1 { font-size: 36px; color: var(--accent-color); margin-bottom: 10px; }

        /* ডিরেক্টরি কন্টেইনার ও সার্চ */
        .directory-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        .search-box { max-width: 600px; margin: 0 auto 40px; position: relative; }
        .search-box input { width: 100%; padding: 15px 20px 15px 50px; border: 2px solid #ddd; border-radius: 50px; font-size: 16px; outline: none; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .search-box input:focus { border-color: var(--primary-color); }
        .search-box i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 18px; }

        /* কার্ড গ্রিড */
        .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        /* মেম্বার কার্ড ডিজাইন */
        .member-card { background: var(--white); border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.06); transition: 0.3s; position: relative; display: flex; flex-direction: column;}
        .member-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.12); }
        
        .card-header { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); height: 100px; position: relative; }
        .blood-badge { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .card-photo { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--white); object-fit: cover; position: absolute; bottom: -55px; left: 50%; transform: translateX(-50%); background: #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .card-body { padding: 65px 20px 20px; text-align: center; flex-grow: 1; }
        .card-name { font-size: 22px; font-weight: 700; color: var(--secondary-color); margin-bottom: 5px; }
        .card-dept { font-size: 15px; color: var(--primary-color); font-weight: 600; margin-bottom: 15px; }
        
        .info-list { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .info-list p { font-size: 14px; color: #555; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; }
        .info-list p:last-child { margin-bottom: 0; }
        .info-list i { color: var(--primary-color); margin-top: 4px; width: 16px; text-align: center;}
        
        /* কন্টাক্ট বাটনস */
        .card-footer { display: flex; border-top: 1px solid #eee; }
        .contact-btn { flex: 1; padding: 15px 0; text-align: center; text-decoration: none; font-weight: 600; font-size: 15px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-call { color: var(--secondary-color); background: #fcfcfc; border-right: 1px solid #eee; }
        .btn-call:hover { background: #e8f4fd; color: #2980b9; }
        .btn-wa { color: #25D366; background: #fcfcfc; }
        .btn-wa:hover { background: #e9fbf0; color: #1da851; }

        #loadingMessage { text-align: center; font-size: 20px; color: var(--primary-color); margin-top: 30px; grid-column: 1 / -1; }
        .no-result { text-align: center; color: #e74c3c; font-size: 18px; padding: 20px; font-weight: bold; grid-column: 1 / -1;}

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links { position: absolute; top: 100%; left: -100%; width: 100%; height: 100vh; background-color: var(--white); flex-direction: column; align-items: flex-start; padding: 20px; transition: 0.5s; }
            .nav-links.active { left: 0; }
        }
    </style>
</head>
<body>

    <!-- ডাইনামিক নেভিগেশন বার -->
    <header>
        <div class="navbar">
            <div class="logo"><a href="index.html"><img src="logo.png" alt="Logo"></a></div>
            <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
            <ul class="nav-links" id="nav-menu">
                <!-- জাভাস্ক্রিপ্ট দিয়ে মেনু তৈরি হবে -->
            </ul>
        </div>
    </header>

    <section class="page-header">
        <h1>মেম্বার ডিরেক্টরি</h1>
        <p>সংগঠনের সকল সদস্যদের তথ্য খুঁজুন এবং যোগাযোগ করুন</p>
    </section>

    <div class="directory-container">
        
        <!-- সার্চ বক্স -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="নাম, ডিপার্টমেন্ট, সেশন বা রক্তের গ্রুপ দিয়ে খুঁজুন..." onkeyup="filterMembers()">
        </div>

        <!-- মেম্বারদের কার্ড গ্রিড -->
        <div class="members-grid" id="membersGrid">
            <div id="loadingMessage"><i class="fas fa-spinner fa-spin"></i> মেম্বারদের তথ্য লোড হচ্ছে...</div>
        </div>

    </div>

    <script>
        // ========================================================
        const API_URL = "https://script.google.com/macros/s/AKfycby4prftqmqAqauALnrXqgI7nO5f-H4zfu7CNwFYyFaaStsOK7wawUNp8gXhC34mhJ2J/exec";
        // ========================================================

        // সিকিউরিটি চেক: লগইন না থাকলে লগইন পেজে পাঠিয়ে দেবে
        const memberDataString = sessionStorage.getItem('memberData');
        const navMenu = document.getElementById('nav-menu');

        if (memberDataString) {
            navMenu.innerHTML = `
                <li><a href="index.html"><i class="fas fa-home"></i> হোম</a></li>
                <li><a href="gallery.html"><i class="fas fa-images"></i> গ্যালারি</a></li>
                <li><a href="member-directory.html" class="active"><i class="fas fa-users"></i> মেম্বার ডিরেক্টরি</a></li>
                <li><a href="notice.html"><i class="fas fa-bullhorn"></i> নোটিশ</a></li>
                <li><a href="profile.html"><i class="fas fa-user-circle"></i> প্রোফাইল</a></li>
            `;
        } else {
            window.location.href = "member-login-registration.html";
        }

        // মোবাইল মেনু
        document.getElementById('mobile-menu').addEventListener('click', () => { 
            document.getElementById('nav-menu').classList.toggle('active'); 
        });

        let allApprovedMembers = [];

        // ডেটা লোড করা
        function loadDirectory() {
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "get_members" }) })
            .then(response => response.json())
            .then(data => {
                // শুধুমাত্র Approved মেম্বারদের ফিল্টার করা হচ্ছে
                allApprovedMembers = data.filter(m => m.status === 'Approved');
                displayMembers(allApprovedMembers);
            })
            .catch(error => {
                document.getElementById('loadingMessage').innerHTML = '<span style="color:red;">তথ্য লোড করতে সমস্যা হয়েছে! ইন্টারনেট কানেকশন চেক করুন।</span>';
            });
        }

        // কার্ড প্রদর্শন ফাংশন
        function displayMembers(members) {
            const grid = document.getElementById('membersGrid');
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const bloodGroups = ['a+', 'a-', 'b+', 'b-', 'ab+', 'ab-', 'o+', 'o-'];
            const isBloodSearch = bloodGroups.includes(query);
            
            grid.innerHTML = '';

            if(members.length === 0) {
                grid.innerHTML = '<div class="no-result">কোনো মেম্বারের তথ্য পাওয়া যায়নি!</div>';
                return;
            }

            members.reverse().forEach(item => {
                const photoUrl = item.photo ? item.photo : 'https://via.placeholder.com/150';
                
                // হোয়াটসঅ্যাপের জন্য নাম্বার ফরম্যাটিং (বাংলাদেশের কোড +88 যুক্ত করা)
                let waNumber = item.phone.replace(/[^0-9]/g, ''); // শুধু নাম্বার রাখা
                if(waNumber.startsWith('0')) { waNumber = '88' + waNumber; }
                
                let lastBloodText = item.lastBloodDonated ? item.lastBloodDonated : 'কখনো দেননি / তথ্য নেই';
                
                // রক্তের গ্রুপ দিয়ে সার্চ করলে শেষ রক্তদানের তারিখ দেখাবে
                let bloodInfoHtml = '';
                if (isBloodSearch || query === '') {
                    bloodInfoHtml = `<p><i class="fas fa-calendar-check" style="color:#e74c3c;"></i> <span><strong>শেষ রক্তদান:</strong> ${lastBloodText}</span></p>`;
                } else {
                    bloodInfoHtml = `<p><i class="fas fa-calendar-check" style="color:#e74c3c;"></i> <span><strong>শেষ রক্তদান:</strong> ${lastBloodText}</span></p>`;
                }

                const cardHtml = `
                    <div class="member-card">
                        <div class="card-header">
                            <span class="blood-badge"><i class="fas fa-tint"></i> ${item.blood}</span>
                            <img src="${photoUrl}" class="card-photo" alt="Photo">
                        </div>
                        <div class="card-body">
                            <h3 class="card-name">${item.name}</h3>
                            <div class="card-dept">${item.dept} (${item.session})</div>
                            
                            <div class="info-list">
                                ${bloodInfoHtml}
                                <p><i class="fas fa-map-marker-alt"></i> <span><strong>গ্রাম/ইউনিয়ন:</strong> ${item.village}</span></p>
                                <p><i class="fas fa-home"></i> <span><strong>বর্তমান ঠিকানা:</strong> ${item.address}</span></p>
                            </div>
                        </div>
                        <div class="card-footer">
                            <a href="tel:${item.phone}" class="contact-btn btn-call"><i class="fas fa-phone-alt"></i> কল করুন</a>
                            <a href="https://wa.me/${waNumber}" target="_blank" class="contact-btn btn-wa"><i class="fab fa-whatsapp"></i> হোয়াটসঅ্যাপ</a>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });
        }

       // লাইভ সার্চ ফিল্টার (সেশনসহ আপডেট করা)
        function filterMembers() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            
            const filtered = allApprovedMembers.filter(m => 
                m.name.toLowerCase().includes(query) || 
                m.dept.toLowerCase().includes(query) || 
                m.blood.toLowerCase().includes(query) ||
                m.session.toLowerCase().includes(query)
            );
            
            displayMembers(filtered);
        }

        // পেজ লোড হলে কল হবে
        window.onload = loadDirectory;
    </script>
<script>
    // Service Worker রেজিস্টার করা
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/dusab/sw.js')
            .then(registration => {
                console.log('Service Worker Registered Successfully!', registration.scope);
            })
            .catch(err => {
                console.log('Service Worker Registration Failed:', err);
            });
        });
    }
</script>

</body>
</html>
