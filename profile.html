<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার প্রোফাইল - DUSAB</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">

    <style>
        :root { --primary-color: #7D1B7E; --secondary-color: #262E7A; --accent-color: #D4AF37; --bg-light: #f4f5f7; --text-dark: #212529; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; padding-top: 80px; }

        /* ডাইনামিক নেভিগেশন বার */
        header { background-color: var(--white); position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .navbar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 10px 20px; }
        .logo img { height: 60px; display: block; }
        .nav-links { display: flex; list-style: none; align-items: center; }
        .nav-links li { position: relative; }
        .nav-links a { color: var(--primary-color); text-decoration: none; padding: 10px 15px; font-size: 17px; font-weight: 600; transition: 0.3s; display: block; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-color); }
        .menu-toggle { display: none; color: var(--primary-color); font-size: 26px; cursor: pointer; }

        /* প্রোফাইল কন্টেইনার */
        .profile-container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .profile-card { background: var(--white); border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); overflow: hidden; }
        
        /* প্রোফাইল হেডার */
        .profile-header { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); padding: 40px 20px; text-align: center; color: white; position: relative; }
        .profile-photo-wrapper { position: relative; width: 150px; height: 150px; margin: 0 auto 15px; }
        .profile-photo { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 5px solid var(--white); background: #eee; }
        
        .edit-photo-btn { position: absolute; bottom: 5px; right: 5px; background: var(--accent-color); color: var(--white); width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 2px solid white; display: none; }
        .profile-name { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        
        /* বডি এবং গ্রিড */
        .profile-body { padding: 40px 30px; position: relative; }
        .control-btns { position: absolute; top: 20px; right: 30px; display: flex; gap: 10px;}
        .btn { padding: 8px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; font-size: 15px; transition: 0.3s;}
        .btn-edit { background: var(--accent-color); color: var(--white); }
        .btn-edit:hover { background: #b5952f; }
        .btn-logout { background: #e74c3c; color: white; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .info-item { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary-color); }
        .info-item span { color: #777; font-size: 13px; display: block; margin-bottom: 5px; }
        .info-item strong { color: var(--secondary-color); font-size: 16px; }
        .full-width { grid-column: 1 / -1; }

        /* এডিট ফর্ম (হাইড করা থাকে প্রথমে) */
        #editProfileForm { display: none; margin-top: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: 600; color: var(--secondary-color); }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; outline: none; }
        .input-group input:focus { border-color: var(--primary-color); }
        .btn-save { background: var(--primary-color); color: white; width: 100%; padding: 15px; font-size: 18px; margin-top: 20px; }

        /* ক্রপ মডাল */
        .crop-modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center; padding: 20px; }
        .crop-modal-content { background-color: var(--white); padding: 20px; border-radius: 8px; width: 100%; max-width: 500px; }
        .crop-container { width: 100%; height: 300px; margin-bottom: 20px; }
        .crop-container img { max-width: 100%; display: block; }
        .btn-crop-save { background-color: var(--primary-color); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; float: right;}

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links { position: absolute; top: 100%; left: -100%; width: 100%; height: 100vh; background-color: var(--white); flex-direction: column; align-items: flex-start; padding: 20px; transition: 0.5s; }
            .nav-links.active { left: 0; }
            .info-grid { grid-template-columns: 1fr; }
            .control-btns { position: relative; top: 0; right: 0; justify-content: flex-end; margin-bottom: 20px;}
        }
    </style>
</head>
<body>

    <!-- ডাইনামিক নেভিগেশন বার -->
    <header>
        <div class="navbar">
            <div class="logo"><a href="index.html"><img src="logo.png" alt="Logo"></a></div>
            <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
            <ul class="nav-links" id="nav-menu">
                <!-- জাভাস্ক্রিপ্ট দিয়ে মেনু তৈরি হবে -->
            </ul>
        </div>
    </header>

    <div class="profile-container">
        <div class="profile-card">
            
            <div class="profile-header">
                <div class="profile-photo-wrapper">
                    <img id="viewPhoto" src="" class="profile-photo" alt="Profile">
                    <!-- এডিট মোডে ছবি চেঞ্জ করার বাটন -->
                    <label for="imageUploadInput" class="edit-photo-btn" id="editPhotoBtn">
                        <i class="fas fa-camera"></i>
                    </label>
                    <input type="file" id="imageUploadInput" accept="image/*" style="display: none;" onchange="openCropModal(event)">
                    <input type="hidden" id="newCroppedImage">
                </div>
                <h1 class="profile-name" id="viewName">লোড হচ্ছে...</h1>
                <p id="viewSessionDept"><i class="fas fa-graduation-cap"></i> -</p>
            </div>

            <div class="profile-body">
                <div class="control-btns">
                    <button class="btn btn-edit" id="toggleEditBtn" onclick="toggleEditMode()"><i class="fas fa-edit"></i> এডিট প্রোফাইল</button>
                    <button class="btn btn-logout" onclick="userLogout()"><i class="fas fa-sign-out-alt"></i> লগআউট</button>
                </div>

                <!-- ভিউ মোড -->
                <div id="viewMode" class="info-grid">
                    <div class="info-item"><span><i class="fas fa-phone-alt"></i> মোবাইল নাম্বার</span><strong id="vPhone"></strong></div>
                    <div class="info-item"><span><i class="fas fa-tint"></i> রক্তের গ্রুপ</span><strong id="vBlood" style="color:#e74c3c;"></strong></div>
                    <div class="info-item"><span><i class="fas fa-building"></i> হল</span><strong id="vHall"></strong></div>
                    <div class="info-item"><span><i class="fas fa-map-marker-alt"></i> গ্রাম/ইউনিয়ন</span><strong id="vVillage"></strong></div>
                    <div class="info-item"><span><i class="fas fa-school"></i> স্কুল/মাদ্রাসা</span><strong id="vSchool"></strong></div>
                    <div class="info-item"><span><i class="fas fa-university"></i> কলেজ/মাদ্রাসা</span><strong id="vCollege"></strong></div>
                    <div class="info-item full-width"><span><i class="fas fa-home"></i> বর্তমান ঠিকানা</span><strong id="vAddress"></strong></div>
                </div>

                <!-- এডিট মোড ফর্ম -->
                <form id="editProfileForm">
                    <div class="info-grid">
                        <div class="input-group">
                            <label>পূর্ণ নাম</label>
                            <input type="text" id="eName" required>
                        </div>
                        <div class="input-group">
                            <label>মোবাইল নাম্বার (পরিবর্তনযোগ্য নয়)</label>
                            <input type="text" id="ePhone" disabled style="background:#eee;">
                        </div>
                        <div class="input-group">
                            <label>সেশন</label>
                            <input type="text" id="eSession" required>
                        </div>
                        <div class="input-group">
                            <label>ডিপার্টমেন্ট</label>
                            <input type="text" id="eDept" required>
                        </div>
                        <div class="input-group">
                            <label>রক্তের গ্রুপ</label>
                            <select id="eBlood">
                                <option value="A+">A+</option><option value="A-">A-</option>
                                <option value="B+">B+</option><option value="B-">B-</option>
                                <option value="AB+">AB+</option><option value="AB-">AB-</option>
                                <option value="O+">O+</option><option value="O-">O-</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>হল</label>
                            <input type="text" id="eHall" required>
                        </div>
                        <div class="input-group">
                            <label>গ্রাম/ইউনিয়ন</label>
                            <input type="text" id="eVillage" required>
                        </div>
                        <div class="input-group">
                            <label>নতুন পাসওয়ার্ড (পরিবর্তন করতে চাইলে)</label>
                            <input type="text" id="ePassword" required>
                        </div>
                        <div class="input-group">
                            <label>স্কুল/মাদ্রাসা</label>
                            <input type="text" id="eSchool">
                        </div>
                        <div class="input-group">
                            <label>কলেজ/মাদ্রাসা</label>
                            <input type="text" id="eCollege">
                        </div>
                        <div class="input-group full-width">
                            <label>বর্তমান ঠিকানা</label>
                            <textarea id="eAddress" required rows="3"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-save" id="saveBtn">তথ্য আপডেট করুন</button>
                </form>

            </div>
        </div>
    </div>

    <!-- ক্রপ মডাল -->
    <div id="cropModal" class="crop-modal">
        <div class="crop-modal-content">
            <h3 style="margin-bottom: 15px; color: var(--primary-color);">প্রোফাইল ছবি ক্রপ করুন</h3>
            <div class="crop-container"><img id="imageToCrop" src=""></div>
            <button class="btn-crop-save" onclick="cropAndSave()">সেভ করুন</button>
            <div style="clear:both;"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzraHbfvmMpaJko-nlrcK4kSpuU0XUdVsks-Bi-nVfyYLB3-Noh_EuM2_Nsk488N5z1/exec"; // <-- URL বসান

        // মোবাইল মেনু লজিক
        document.getElementById('mobile-menu').addEventListener('click', () => { 
            document.getElementById('nav-menu').classList.toggle('active'); 
        });

        // =====================================
        // ডাইনামিক নেভিগেশন রেন্ডার করা
        // =====================================
        const memberDataString = sessionStorage.getItem('memberData');
        const navMenu = document.getElementById('nav-menu');

        if (memberDataString) {
            // লগইন করা থাকলে
            navMenu.innerHTML = `
                <li><a href="index.html"><i class="fas fa-home"></i> হোম</a></li>
                <li><a href="gallery.html"><i class="fas fa-images"></i> গ্যালারি</a></li>
                <li><a href="member-directory.html"><i class="fas fa-users"></i> মেম্বার ডিরেক্টরি</a></li>
                <li><a href="notice.html"><i class="fas fa-bullhorn"></i> নোটিশ</a></li>
                <li><a href="profile.html" class="active"><i class="fas fa-user-circle"></i> প্রোফাইল</a></li>
            `;
        } else {
            // লগইন করা না থাকলে পেজ থেকে বের করে লগইনে পাঠানো
            window.location.href = "member-login-registration.html";
        }

        const userData = JSON.parse(memberDataString);
        let isEditMode = false;

        // ডেটা ভিউ পেজে বসানো
        function populateView() {
            document.getElementById('viewPhoto').src = userData.photo || "https://via.placeholder.com/150";
            document.getElementById('viewName').innerText = userData.name;
            document.getElementById('viewSessionDept').innerHTML = `<i class="fas fa-graduation-cap"></i> ${userData.dept} (${userData.session})`;
            
            document.getElementById('vPhone').innerText = userData.phone;
            document.getElementById('vBlood').innerText = userData.blood;
            document.getElementById('vHall').innerText = userData.hall;
            document.getElementById('vVillage').innerText = userData.village;
            document.getElementById('vSchool').innerText = userData.school || "দেওয়া হয়নি";
            document.getElementById('vCollege').innerText = userData.college || "দেওয়া হয়নি";
            document.getElementById('vAddress').innerText = userData.address;
        }

        populateView();

        function userLogout() {
            sessionStorage.removeItem('memberData');
            window.location.href = "index.html";
        }

        // এডিট মোড টগল করা
        function toggleEditMode() {
            isEditMode = !isEditMode;
            const viewDiv = document.getElementById('viewMode');
            const formDiv = document.getElementById('editProfileForm');
            const toggleBtn = document.getElementById('toggleEditBtn');
            const photoBtn = document.getElementById('editPhotoBtn');

            if(isEditMode) {
                viewDiv.style.display = 'none';
                formDiv.style.display = 'block';
                photoBtn.style.display = 'flex';
                toggleBtn.innerHTML = '<i class="fas fa-times"></i> বাতিল করুন';
                toggleBtn.style.background = '#e74c3c';
                
                // ফর্মে ডেটা ফিলআপ
                document.getElementById('eName').value = userData.name;
                document.getElementById('ePhone').value = userData.phone;
                document.getElementById('eSession').value = userData.session;
                document.getElementById('eDept').value = userData.dept;
                document.getElementById('eBlood').value = userData.blood;
                document.getElementById('eHall').value = userData.hall;
                document.getElementById('eVillage').value = userData.village;
                document.getElementById('ePassword').value = userData.password;
                document.getElementById('eSchool').value = userData.school;
                document.getElementById('eCollege').value = userData.college;
                document.getElementById('eAddress').value = userData.address;
            } else {
                viewDiv.style.display = 'grid';
                formDiv.style.display = 'none';
                photoBtn.style.display = 'none';
                toggleBtn.innerHTML = '<i class="fas fa-edit"></i> এডিট প্রোফাইল';
                toggleBtn.style.background = 'var(--accent-color)';
                document.getElementById('newCroppedImage').value = ""; // বাতিল করলে ক্রপ ইমেজ ক্লিয়ার
                populateView(); // আগের ছবি রিস্টোর
            }
        }

        // ছবি ক্রপ লজিক
        let cropper;
        function openCropModal(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imageToCrop').src = e.target.result;
                    document.getElementById('cropModal').style.display = 'flex';
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(document.getElementById('imageToCrop'), { aspectRatio: 1, viewMode: 1 });
                };
                reader.readAsDataURL(file);
            }
        }

        function cropAndSave() {
            if (cropper) {
                const croppedUrl = cropper.getCroppedCanvas({ width: 400, height: 400 }).toDataURL('image/jpeg', 0.9);
                document.getElementById('viewPhoto').src = croppedUrl; // লাইভ প্রিভিউ
                document.getElementById('newCroppedImage').value = croppedUrl; // হিডেন ফিল্ডে সেভ
                document.getElementById('cropModal').style.display = 'none';
            }
        }

        // প্রোফাইল আপডেট সাবমিট
        document.getElementById('editProfileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> আপডেট হচ্ছে...';
            btn.disabled = true;

            const newImageRaw = document.getElementById('newCroppedImage').value;
            let base64Data = "";
            if(newImageRaw) base64Data = newImageRaw.split(',')[1];

            const payload = {
                action: "update_profile",
                row: userData.row,
                phone: userData.phone, // ফোন নম্বর অপরিবর্তিত
                photoUrl: userData.photo, // আগের ছবি (যদি নতুন না দেয়)
                name: document.getElementById('eName').value,
                session: document.getElementById('eSession').value,
                dept: document.getElementById('eDept').value,
                hall: document.getElementById('eHall').value,
                village: document.getElementById('eVillage').value,
                blood: document.getElementById('eBlood').value,
                password: document.getElementById('ePassword').value,
                school: document.getElementById('eSchool').value,
                college: document.getElementById('eCollege').value,
                address: document.getElementById('eAddress').value,
                base64: base64Data,
                fileName: "profile_" + userData.phone + ".jpg",
                mimeType: "image/jpeg"
            };

            fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    alert("প্রোফাইল সফলভাবে আপডেট হয়েছে!");
                    // লোকাল ডেটা আপডেট করা
                    userData.name = payload.name; userData.session = payload.session;
                    userData.dept = payload.dept; userData.hall = payload.hall;
                    userData.village = payload.village; userData.blood = payload.blood;
                    userData.password = payload.password; userData.school = payload.school;
                    userData.college = payload.college; userData.address = payload.address;
                    if(base64Data) userData.photo = data.photoUrl; // নতুন ছবি হলে
                    
                    sessionStorage.setItem('memberData', JSON.stringify(userData));
                    toggleEditMode(); // ভিউ মোডে ফেরত যাওয়া
                    populateView(); // নতুন ডেটা দেখানো
                } else {
                    alert("আপডেট ব্যর্থ হয়েছে!");
                }
            }).finally(() => { btn.innerHTML = 'তথ্য আপডেট করুন'; btn.disabled = false; });
        });
    </script>
</body>
</html>
