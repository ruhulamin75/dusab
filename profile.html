<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার প্রোফাইল - DUSAB</title>
    <link rel="manifest" href="/dusab/manifest.json">
    <meta name="theme-color" content="#7D1B7E">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">

    <style>
        :root { --primary-color: #7D1B7E; --secondary-color: #262E7A; --accent-color: #D4AF37; --bg-light: #f4f5f7; --text-dark: #212529; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-light); padding-top: 80px; }

        .profile-container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .profile-card { background: var(--white); border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .profile-header { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); padding: 40px 20px; text-align: center; color: white; }
        
        .profile-photo-wrapper { position: relative; width: 150px; height: 150px; margin: 0 auto 15px; }
        .profile-photo { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 5px solid var(--white); background: #eee; }
        .edit-photo-btn { position: absolute; bottom: 5px; right: 5px; background: var(--accent-color); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 3px solid white; transition: 0.3s; }
        .edit-photo-btn:hover { transform: scale(1.1); }
        
        .profile-body { padding: 40px 30px; }
        .control-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .btn { padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; font-size: 15px; }
        .btn-edit { background: var(--accent-color); color: var(--white); }
        .btn-logout { background: #e74c3c; color: white; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .info-item { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary-color); }
        .info-item span { color: #777; font-size: 13px; display: block; }
        .info-item strong { color: var(--secondary-color); font-size: 16px; }

        #editProfileForm { display: none; margin-top: 20px; background: #fdfdfd; padding: 20px; border: 1px solid #eee; border-radius: 8px;}
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 5px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        
        .crop-modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center; padding: 20px; }
        .crop-modal-content { background: white; padding: 20px; border-radius: 8px; width: 100%; max-width: 500px; }
        .crop-container { width: 100%; height: 300px; margin-bottom: 20px; }
        .btn-crop-save { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; float: right;}
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-photo-wrapper">
                    <img id="viewPhoto" src="" class="profile-photo">
                    <label for="imageUploadInput" class="edit-photo-btn"><i class="fas fa-camera"></i></label>
                    <input type="file" id="imageUploadInput" accept="image/*" style="display: none;" onchange="openCropModal(event)">
                </div>
                <h1 id="viewName"></h1>
                <p id="viewSessionDept"></p>
            </div>

            <div class="profile-body">
                <div class="control-btns">
                    <button class="btn btn-edit" onclick="toggleEditMode()" id="editToggleBtn"><i class="fas fa-edit"></i> প্রোফাইল এডিট করুন</button>
                    <button class="btn btn-logout" onclick="userLogout()"><i class="fas fa-sign-out-alt"></i> লগআউট</button>
                </div>

                <div id="viewMode" class="info-grid">
                    <div class="info-item"><span>মোবাইল</span><strong id="vPhone"></strong></div>
                    <div class="info-item"><span>রক্তের গ্রুপ</span><strong id="vBlood"></strong></div>
                    <div class="info-item"><span>শেষ রক্তদান</span><strong id="vLastBlood"></strong></div>
                    <div class="info-item"><span>হল</span><strong id="vHall"></strong></div>
                    <div class="info-item full-width"><span>বর্তমান ঠিকানা</span><strong id="vAddress"></strong></div>
                </div>

                <form id="editProfileForm">
                    <div class="form-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="input-group"><label>নাম</label><input type="text" id="eName" required></div>
                        <div class="input-group"><label>সেশন</label><input type="text" id="eSession" required></div>
                        <div class="input-group"><label>ডিপার্টমেন্ট</label><input type="text" id="eDept" required></div>
                        <div class="input-group"><label>রক্তের গ্রুপ</label>
                            <select id="eBlood">
                                <option value="A+">A+</option><option value="O+">O+</option><option value="B+">B+</option><option value="AB+">AB+</option>
                            </select>
                        </div>
                        <div class="input-group"><label>শেষ রক্তদানের তারিখ</label><input type="date" id="eLastBlood"></div>
                        <div class="input-group full-width"><label>ঠিকানা</label><textarea id="eAddress"></textarea></div>
                    </div>
                    <button type="submit" class="btn btn-edit" style="width:100%">সংরক্ষণ করুন</button>
                </form>
            </div>
        </div>
    </div>

    <!-- ক্রপ মডাল -->
    <div id="cropModal" class="crop-modal">
        <div class="crop-modal-content">
            <h3>ছবি ক্রপ করুন</h3>
            <div class="crop-container"><img id="imageToCrop" src=""></div>
            <button class="btn-crop-save" onclick="cropAndSave()">সেভ করুন</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwzg8IKkY1cexDTxnAl3-PryfScT_QgOMKw1Rr6W6aThMly0Wf-21ywd_-GIcrmiuE3/exec";
        const userData = JSON.parse(sessionStorage.getItem('memberData'));
        let isEdit = false;

        function populateView() {
            document.getElementById('viewPhoto').src = userData.photo || "https://via.placeholder.com/150";
            document.getElementById('viewName').innerText = userData.name;
            document.getElementById('viewSessionDept').innerText = `${userData.dept} | ${userData.session}`;
            document.getElementById('vPhone').innerText = userData.phone;
            document.getElementById('vBlood').innerText = userData.blood;
            document.getElementById('vLastBlood').innerText = userData.lastBloodDonated || 'দেওয়া হয়নি';
            document.getElementById('vHall').innerText = userData.hall;
            document.getElementById('vAddress').innerText = userData.address;
        }

        populateView();

        function toggleEditMode() {
            isEdit = !isEdit;
            document.getElementById('viewMode').style.display = isEdit ? 'none' : 'grid';
            document.getElementById('editProfileForm').style.display = isEdit ? 'block' : 'none';
            document.getElementById('editToggleBtn').innerHTML = isEdit ? '<i class="fas fa-times"></i> বাতিল' : '<i class="fas fa-edit"></i> প্রোফাইল এডিট করুন';
            
            if(isEdit) {
                document.getElementById('eName').value = userData.name;
                document.getElementById('eSession').value = userData.session;
                document.getElementById('eDept').value = userData.dept;
                document.getElementById('eBlood').value = userData.blood;
                document.getElementById('eLastBlood').value = userData.lastBloodDonated;
                document.getElementById('eAddress').value = userData.address;
            }
        }

        // ছবি পরিবর্তন লজিক
        let cropper;
        function openCropModal(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById('imageToCrop').src = event.target.result;
                document.getElementById('cropModal').style.display = 'flex';
                if(cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('imageToCrop'), { aspectRatio: 1 });
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function cropAndSave() {
            const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
            const base64 = canvas.toDataURL('image/jpeg');
            updateProfile(base64); // ছবি আপডেট করার জন্য আলাদা কল
            document.getElementById('cropModal').style.display = 'none';
        }

        function updateProfile(imgBase64 = "") {
            const payload = {
                action: "update_profile",
                row: userData.row,
                phone: userData.phone,
                photoUrl: userData.photo,
                name: document.getElementById('eName').value,
                session: document.getElementById('eSession').value,
                dept: document.getElementById('eDept').value,
                blood: document.getElementById('eBlood').value,
                lastBloodDonated: document.getElementById('eLastBlood').value,
                address: document.getElementById('eAddress').value,
                base64: imgBase64 ? imgBase64.split(',')[1] : "",
                fileName: "p_" + userData.phone + ".jpg",
                mimeType: "image/jpeg"
            };

            fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(r => r.json()).then(d => {
                alert("আপডেট সফল!");
                location.reload();
            });
        }

        document.getElementById('editProfileForm').onsubmit = (e) => { e.preventDefault(); updateProfile(); };
        function userLogout() { sessionStorage.removeItem('memberData'); window.location.href = "index.html"; }
    </script>
</body>
</html>
